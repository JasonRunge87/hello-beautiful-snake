<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Beautiful – Snake Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --gold: #c9a84c;
    --gold-light: #e8d08a;
    --rose: #d4617a;
    --white: #f5f0e8;
    --green: #4caf72;
    --dim: #2a2a3a;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Cormorant Garamond', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Subtle star field */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 15%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  #screen-start, #screen-game, #screen-gameover, #screen-winner {
    display: none;
    position: relative;
    z-index: 1;
    width: 100%;
    align-items: center;
    flex-direction: column;
  }
  .active { display: flex !important; }

  /* ── START SCREEN ── */
  #screen-start {
    justify-content: center;
    text-align: center;
    gap: 24px;
    padding: 40px 20px;
  }

  .title-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s 0.3s forwards;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(38px, 7vw, 72px);
    color: var(--white);
    line-height: 1.1;
    opacity: 0;
    animation: fadeUp 1s 0.6s forwards;
  }

  h1 span { color: var(--gold); }

  .subtitle {
    font-size: 18px;
    font-style: italic;
    color: rgba(245,240,232,0.55);
    opacity: 0;
    animation: fadeUp 1s 0.9s forwards;
  }

  .instructions {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: rgba(201,168,76,0.6);
    opacity: 0;
    animation: fadeUp 1s 1.2s forwards;
  }

  .btn-start {
    margin-top: 10px;
    padding: 14px 48px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0;
    animation: fadeUp 1s 1.5s forwards;
    text-transform: uppercase;
  }
  .btn-start:hover {
    background: var(--gold);
    color: var(--bg);
  }

  .score-target {
    font-size: 14px;
    font-style: italic;
    color: rgba(245,240,232,0.35);
    opacity: 0;
    animation: fadeUp 1s 1.7s forwards;
  }

  /* ── GAME SCREEN ── */
  #screen-game { justify-content: center; }

  #hud {
    width: 900px;
    max-width: 95vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 4px;
  }

  .hud-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.25em;
    color: var(--gold);
  }

  .hud-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--white);
  }

  .progress-bar-wrap {
    flex: 1;
    margin: 0 20px;
    height: 2px;
    background: var(--dim);
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--rose));
    width: 0%;
    transition: width 0.3s;
  }

  canvas {
    display: block;
    border: 1px solid rgba(201,168,76,0.25);
    background: #07070d;
    max-width: 95vw;
  }

  .controls-hint {
    margin-top: 12px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(201,168,76,0.35);
  }

  /* ── GAME OVER ── */
  #screen-gameover {
    justify-content: center;
    text-align: center;
    gap: 20px;
    padding: 40px 20px;
  }

  .go-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--rose);
  }

  .go-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 300;
    font-style: italic;
    color: var(--white);
  }

  .go-score span { color: var(--gold); }

  /* ── WINNER SCREEN ── */
  #screen-winner {
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }

  #winner-message {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(28px, 5vw, 56px);
    color: var(--white);
    line-height: 1.3;
    max-width: 700px;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  #winner-message.visible { opacity: 1; }
  #winner-message.fade-out { opacity: 0; }

  #winner-sub {
    margin-top: 16px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    opacity: 0;
    transition: opacity 1.2s ease 0.3s;
  }
  #winner-sub.visible { opacity: 1; }
  #winner-sub.fade-out { opacity: 0; }

  #hearts-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  #winner-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .ring-emoji {
    font-size: 56px;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.8s, transform 0.8s;
    display: none;
  }
  .ring-emoji.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* ── MOBILE CONTROLS ── */
  #mobile-controls {
    display: none;
    margin-top: 16px;
    gap: 8px;
    flex-direction: column;
    align-items: center;
  }

  .ctrl-row { display: flex; gap: 8px; }

  .ctrl-btn {
    width: 56px;
    height: 56px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-size: 22px;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { background: rgba(201,168,76,0.25); }

  @media (max-width: 600px) or (pointer: coarse) {
    #mobile-controls { display: flex; }
    .controls-hint { display: none; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse-gold {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
    50%       { box-shadow: 0 0 24px 4px rgba(201,168,76,0.3); }
  }
</style>
</head>
<body>

<!-- ══════════════ START SCREEN ══════════════ -->
<div id="screen-start" class="active">
  <p class="title-eyebrow">A game made with love</p>
  <h1>Hello <span>Beautiful</span></h1>
  <p class="subtitle">A snake game crafted just for you</p>
  <p class="instructions">Arrow keys to move &nbsp;·&nbsp; Collect the light</p>
  <button class="btn-start" onclick="startGame()">Begin</button>
  <p class="score-target">Reach 200 points to unlock a message</p>
</div>

<!-- ══════════════ GAME SCREEN ══════════════ -->
<div id="screen-game">
  <div id="hud">
    <div>
      <div class="hud-label">Score</div>
      <div class="hud-score" id="score-display">0</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div style="text-align:right">
      <div class="hud-label">Goal</div>
      <div class="hud-score" style="color:var(--gold)">200</div>
    </div>
  </div>
  <canvas id="gameCanvas" width="900" height="600"></canvas>
  <p class="controls-hint">↑ ↓ ← → to move</p>

  <!-- Mobile D-pad -->
  <div id="mobile-controls">
    <div class="ctrl-row"><button class="ctrl-btn" id="btn-up">↑</button></div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="btn-left">←</button>
      <button class="ctrl-btn" id="btn-down">↓</button>
      <button class="ctrl-btn" id="btn-right">→</button>
    </div>
  </div>
</div>

<!-- ══════════════ GAME OVER SCREEN ══════════════ -->
<div id="screen-gameover">
  <p class="go-label">Game Over</p>
  <p class="go-score">You scored <span id="final-score-go">0</span></p>
  <p class="subtitle" style="color:rgba(245,240,232,0.45)">The snake got away this time…</p>
  <button class="btn-start" onclick="startGame()">Try Again</button>
</div>

<!-- ══════════════ WINNER SCREEN ══════════════ -->
<div id="screen-winner">
  <canvas id="hearts-canvas"></canvas>
  <div id="winner-content">
    <div class="ring-emoji" id="ring-emoji">💍</div>
    <p id="winner-message"></p>
    <p id="winner-sub"></p>
  </div>
</div>

<script>
// ────────────────────────────────────────────
//  GAME STATE
// ────────────────────────────────────────────
const CELL = 10;
const W = 900, H = 600;
const SPEED = 150; // ms per tick

let snake, dir, nextDir, fruit, score, gameLoop, gameRunning;

function startGame() {
  showScreen('game');
  snake = [{x:100,y:50},{x:90,y:50},{x:80,y:50},{x:70,y:50}];
  dir = 'RIGHT';
  nextDir = 'RIGHT';
  score = 0;
  spawnFruit();
  updateHUD();
  gameRunning = true;
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, SPEED);
}

function spawnFruit() {
  fruit = {
    x: Math.floor(Math.random() * (W/CELL)) * CELL,
    y: Math.floor(Math.random() * (H/CELL)) * CELL
  };
}

function tick() {
  if (!gameRunning) return;

  // Apply direction
  dir = nextDir;

  const head = { x: snake[0].x, y: snake[0].y };
  if (dir === 'UP')    head.y -= CELL;
  if (dir === 'DOWN')  head.y += CELL;
  if (dir === 'LEFT')  head.x -= CELL;
  if (dir === 'RIGHT') head.x += CELL;

  // Wall collision
  if (head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) {
    endGame(); return;
  }

  // Self collision
  for (let seg of snake) {
    if (head.x === seg.x && head.y === seg.y) { endGame(); return; }
  }

  snake.unshift(head);

  // Eat fruit
  if (head.x === fruit.x && head.y === fruit.y) {
    score += 10;
    updateHUD();
    if (score >= 200) { clearInterval(gameLoop); gameRunning = false; showWinner(); return; }
    spawnFruit();
  } else {
    snake.pop();
  }

  draw();
}

// ────────────────────────────────────────────
//  DRAWING
// ────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth * 0.95, 900);
  const scale = maxW / 900;
  canvas.style.width  = (900 * scale) + 'px';
  canvas.style.height = (600 * scale) + 'px';
  document.getElementById('hud').style.width = (900 * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function draw() {
  ctx.fillStyle = '#07070d';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += CELL) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += CELL) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Fruit — glowing dot
  const fx = fruit.x + CELL/2, fy = fruit.y + CELL/2;
  const grd = ctx.createRadialGradient(fx,fy,0,fx,fy,10);
  grd.addColorStop(0, 'rgba(212,97,122,1)');
  grd.addColorStop(0.5, 'rgba(212,97,122,0.6)');
  grd.addColorStop(1, 'rgba(212,97,122,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(fx, fy, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f5c6d0';
  ctx.beginPath(); ctx.arc(fx, fy, 3, 0, Math.PI*2); ctx.fill();

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const g = Math.round(180 - t * 80);
    ctx.fillStyle = i === 0 ? '#a8e6c0' : `rgb(60,${g},90)`;
    ctx.beginPath();
    ctx.roundRect(seg.x+1, seg.y+1, CELL-2, CELL-2, 3);
    ctx.fill();
  });
}

function updateHUD() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('progress-fill').style.width = Math.min(score/200*100, 100) + '%';
}

// ────────────────────────────────────────────
//  GAME OVER
// ────────────────────────────────────────────
function endGame() {
  clearInterval(gameLoop);
  gameRunning = false;
  document.getElementById('final-score-go').textContent = score;
  showScreen('gameover');
}

// ────────────────────────────────────────────
//  WINNER SEQUENCE
// ────────────────────────────────────────────
const messages = [
  { text: "Winner!", sub: null },
  { text: "Rebecca, I love you.", sub: null },
  { text: "Having you by my side completes me.", sub: null },
  { text: "You are my heart and my love.", sub: null },
  { text: "I cannot imagine a life without you.", sub: null },
  { text: "Will you marry me?", sub: "💍", ring: true }
];

function showWinner() {
  showScreen('winner');
  startHearts();
  let i = 0;
  showMessage(messages[i]);
  const interval = setInterval(() => {
    i++;
    if (i >= messages.length) { clearInterval(interval); return; }
    fadeOutMessage(() => showMessage(messages[i]));
  }, 4000);
}

function showMessage(m) {
  const el = document.getElementById('winner-message');
  const sub = document.getElementById('winner-sub');
  const ring = document.getElementById('ring-emoji');

  el.textContent = m.text;
  sub.textContent = m.sub || '';
  ring.style.display = 'none';
  ring.classList.remove('visible');

  el.classList.remove('fade-out');
  sub.classList.remove('fade-out');

  setTimeout(() => {
    el.classList.add('visible');
    sub.classList.add('visible');
    if (m.ring) {
      ring.style.display = 'block';
      setTimeout(() => ring.classList.add('visible'), 400);
    }
  }, 50);
}

function fadeOutMessage(cb) {
  const el = document.getElementById('winner-message');
  const sub = document.getElementById('winner-sub');
  el.classList.add('fade-out'); el.classList.remove('visible');
  sub.classList.add('fade-out'); sub.classList.remove('visible');
  setTimeout(cb, 1300);
}

// ────────────────────────────────────────────
//  HEARTS PARTICLE SYSTEM
// ────────────────────────────────────────────
const hCanvas = document.getElementById('hearts-canvas');
const hCtx = hCanvas.getContext('2d');
let hearts = [];

function resizeHearts() {
  hCanvas.width  = window.innerWidth;
  hCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeHearts);
resizeHearts();

function spawnHeart() {
  hearts.push({
    x: Math.random() * hCanvas.width,
    y: hCanvas.height + 20,
    size: 12 + Math.random() * 24,
    speed: 0.8 + Math.random() * 1.5,
    drift: (Math.random() - 0.5) * 0.8,
    alpha: 0.6 + Math.random() * 0.4,
    hue: Math.random() < 0.5 ? '#d4617a' : '#c9a84c'
  });
}

function drawHeart(ctx, x, y, size) {
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.3);
  ctx.bezierCurveTo(x, y, x - size/2, y, x - size/2, y + size*0.3);
  ctx.bezierCurveTo(x - size/2, y + size*0.6, x, y + size*0.85, x, y + size);
  ctx.bezierCurveTo(x, y + size*0.85, x + size/2, y + size*0.6, x + size/2, y + size*0.3);
  ctx.bezierCurveTo(x + size/2, y, x, y, x, y + size * 0.3);
  ctx.closePath();
}

let heartFrame;
function animateHearts() {
  hCtx.clearRect(0, 0, hCanvas.width, hCanvas.height);
  hearts.forEach(h => {
    h.y -= h.speed;
    h.x += h.drift;
    hCtx.save();
    hCtx.globalAlpha = h.alpha * Math.min(1, (hCanvas.height - h.y) / 100);
    hCtx.fillStyle = h.hue;
    drawHeart(hCtx, h.x, h.y, h.size);
    hCtx.fill();
    hCtx.restore();
  });
  hearts = hearts.filter(h => h.y > -40);
  heartFrame = requestAnimationFrame(animateHearts);
}

let heartSpawner;
function startHearts() {
  heartSpawner = setInterval(spawnHeart, 300);
  animateHearts();
}

// ────────────────────────────────────────────
//  SCREEN MANAGER
// ────────────────────────────────────────────
function showScreen(name) {
  ['start','game','gameover','winner'].forEach(s => {
    document.getElementById('screen-' + s).classList.toggle('active', s === name);
  });
  if (name !== 'winner') {
    clearInterval(heartSpawner);
    cancelAnimationFrame(heartFrame);
    hearts = [];
    hCtx.clearRect(0, 0, hCanvas.width, hCanvas.height);
  }
}

// ────────────────────────────────────────────
//  INPUT
// ────────────────────────────────────────────
const opposite = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:'UP', ArrowDown:'DOWN', ArrowLeft:'LEFT', ArrowRight:'RIGHT',
    w:'UP', s:'DOWN', a:'LEFT', d:'RIGHT'
  };
  const d = map[e.key];
  if (d && d !== opposite[dir]) {
    nextDir = d;
    e.preventDefault();
  }
});

// Mobile buttons
const btnMap = { 'btn-up':'UP', 'btn-down':'DOWN', 'btn-left':'LEFT', 'btn-right':'RIGHT' };
Object.entries(btnMap).forEach(([id, d]) => {
  const btn = document.getElementById(id);
  ['touchstart','mousedown'].forEach(evt =>
    btn.addEventListener(evt, (e) => {
      e.preventDefault();
      if (d !== opposite[dir]) nextDir = d;
    })
  );
});

// Touch swipe
let touchStartX, touchStartY;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!gameRunning) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    const d = dx > 0 ? 'RIGHT' : 'LEFT';
    if (d !== opposite[dir]) nextDir = d;
  } else {
    const d = dy > 0 ? 'DOWN' : 'UP';
    if (d !== opposite[dir]) nextDir = d;
  }
}, { passive: true });

// Initial draw
draw();
</script>
</body>
</html>
